version: "3.9"

services:
  # ── Meet & Greet (peer discovery) ─────────────────────────────────────
  meet-eu:
    build: .
    command: ["python3", "-m", "apps.meet_and_greet_server"]
    environment:
      NULLA_HOME: /data
      NULLA_MEET_HOST: "0.0.0.0"
      NULLA_MEET_PORT: "8765"
      NULLA_MEET_AUTH_TOKEN: "${NULLA_MEET_AUTH_TOKEN:?set NULLA_MEET_AUTH_TOKEN}"
      NULLA_MEET_REGION: "eu"
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - meet-eu-data:/data
    restart: unless-stopped

  meet-us:
    build: .
    command: ["python3", "-m", "apps.meet_and_greet_server"]
    environment:
      NULLA_HOME: /data
      NULLA_MEET_HOST: "0.0.0.0"
      NULLA_MEET_PORT: "8765"
      NULLA_MEET_AUTH_TOKEN: "${NULLA_MEET_AUTH_TOKEN:?set NULLA_MEET_AUTH_TOKEN}"
      NULLA_MEET_REGION: "us"
    ports:
      - "127.0.0.1:8766:8765"
    volumes:
      - meet-us-data:/data
    restart: unless-stopped

  # ── Agent Nodes ───────────────────────────────────────────────────────
  agent-1:
    build: .
    command: ["python3", "-m", "apps.nulla_api_server"]
    environment:
      NULLA_HOME: /data
      NULLA_MEET_URL: "http://meet-eu:8765"
      NULLA_API_PORT: "11435"
    ports:
      - "127.0.0.1:11435:11435"
    volumes:
      - agent-1-data:/data
    depends_on:
      - meet-eu
    restart: unless-stopped

  agent-2:
    build: .
    command: ["python3", "-m", "apps.nulla_agent"]
    environment:
      NULLA_HOME: /data
      NULLA_MEET_URL: "http://meet-eu:8765"
    volumes:
      - agent-2-data:/data
    depends_on:
      - meet-eu
    restart: unless-stopped

  # ── Daemon (background swarm maintenance) ─────────────────────────────
  daemon-1:
    build: .
    command: ["python3", "-m", "apps.nulla_daemon"]
    environment:
      NULLA_HOME: /data
      NULLA_MEET_URL: "http://meet-eu:8765"
    ports:
      - "127.0.0.1:49152:49152/udp"
    volumes:
      - daemon-1-data:/data
    depends_on:
      - meet-eu
    restart: unless-stopped

  # ── Brain Hive Watch (read-only dashboard) ────────────────────────────
  brain-hive-watch:
    build: .
    command: ["python3", "-m", "apps.brain_hive_watch_server"]
    environment:
      NULLA_HOME: /data
      NULLA_WATCH_UPSTREAM: "http://meet-eu:8765"
    ports:
      - "127.0.0.1:8788:8788"
    volumes:
      - watch-data:/data
    depends_on:
      - meet-eu
    restart: unless-stopped

volumes:
  meet-eu-data:
  meet-us-data:
  agent-1-data:
  agent-2-data:
  daemon-1-data:
  watch-data:
