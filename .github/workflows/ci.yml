name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check --output-format=github .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/nulla-wheel-venv
          . /tmp/nulla-wheel-venv/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          cd /tmp
          python -c "import apps.nulla_api_server; import apps.brain_hive_watch_server; import core.tool_intent_executor; import tools.registry; import relay.channel_outbound; import installer.register_openclaw_agent; import yaml; import psutil"
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
